name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Ruff
        run: ruff check src/ tests/

      - name: mypy
        run: mypy src/

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Install ffmpeg (required by audio assembly tests)
        run: sudo apt-get install -y ffmpeg

      - name: pytest
        # testpaths in pyproject.toml covers both src/**/*_test.py and tests/
        run: pytest -v --tb=short
        env:
          # Tests must not use real credentials — use stubs
          ELEVENLABS_API_KEY: "test-key-stub"
          AUDIOBOOK_OUTPUT_DIR: "/tmp/audiobook-test-output"
          AUDIOBOOK_CACHE_DIR: "/tmp/audiobook-test-cache"

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install build tools
        run: pip install build

      - name: Build sdist and wheel
        run: python -m build

      - name: Install from wheel and verify CLI entry point
        run: |
          pip install dist/*.whl
          audiobook --help
